name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Software version'
        required: true
      prerelease:
        description: 'Pre-release?'
        required: false
        default: false
  push:
    tags:
      - v[0-9]+.*
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_notes: true
          title: Version ${{ github.event.inputs.version || github.ref_name }}
          overwrite: true
          prerelease: ${{ github.event.inputs.prerelease || false }}

  upload-assets:
    #needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install OpenSSL via Chocolatey
          choco install openssl -y
          # Add OpenSSL to PATH
          $opensslPath = (Get-Command openssl).Source
          $opensslDir = Split-Path -Path $opensslPath -Parent
          Add-Content -Path $env:GITHUB_PATH -Value $opensslDir
          # Set environment variables for Rust
          echo "OPENSSL_DIR=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENSSL_LIB_DIR=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENSSL_INCLUDE_DIR=$opensslDir\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libmysqlclient-dev \
            libtiff-dev \
            libconfig++-dev \
            libconfig-dev \
            pkg-config \
            openssl \
            libssl-dev

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ocsp-server
          include: LICENSE,README.md,config.toml,service.sh
          target: ${{ matrix.target }}
          archive: ocsp-server-${{ github.ref_name }}-${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}